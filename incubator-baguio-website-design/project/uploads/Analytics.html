<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Analytics — Baguio Ecosystem</title>
<meta name="viewport" content="width=1440">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --gdk:#14532D;--gmd:#15803D;--glt:#DCFCE7;--g50:#F0FDF4;
  --orange:#F97149;--orange-lt:#FFF0EB;--green:#22C55E;--green-lt:#DCFCE7;
  --red:#EF4444;--red-lt:#FEF2F2;--amber:#F6A723;--amber-lt:#FFF8EC;
  --violet:#8B5CF6;--violet-lt:#F5F3FF;--blue:#2D6BFF;--blue-lt:#EFF6FF;
  --teal:#0D9488;--teal-lt:#F0FDFA;--bg:#F8FAFC;--card:#fff;
  --ink:#111827;--ink-2:#1F2937;--ink-3:#6B7280;--ink-4:#9CA3AF;
  --line:#E5E7EB;--line-2:#F3F4F6;--r:12px;--r-sm:10px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --font:"Inter",ui-sans-serif,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;padding:0}
input,select{font-family:var(--font)}
.stage{width:1440px;transform-origin:top left}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--card);padding:20px 14px 24px;display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--line);min-height:100vh;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:11px;padding:6px 10px 22px}
.brand-icon{width:38px;height:38px;background:var(--g50);border-radius:10px;display:grid;place-items:center;flex:none;border:1.5px solid var(--glt)}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;font-size:13.5px;font-weight:500;color:var(--ink-3);width:100%;transition:background .12s,color .12s;text-align:left}
.nav-item:hover{background:var(--g50);color:var(--gdk)}
.nav-item.active{background:var(--g50);color:var(--gdk);font-weight:600}
.nav-item .nav-cnt{margin-left:auto;font-size:11px;font-weight:600;color:var(--ink-4);background:var(--line);padding:1px 7px;border-radius:999px}
.nav-item.active .nav-cnt{color:var(--gdk);background:var(--glt)}
.sidebar-spacer{flex:1}
.nav-item.logout{color:var(--orange)}
.nav-item.logout:hover{background:var(--orange-lt)}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;padding:16px 28px;background:var(--card);border-bottom:1.5px solid var(--line);gap:16px}
.page-title{font-size:30px;font-weight:800;color:var(--ink);letter-spacing:-.025em;flex:none}
.topbar-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--line);border-radius:8px;padding:7px 14px;min-width:220px}
.search-box input{border:none;outline:none;background:transparent;font-size:13px;color:var(--ink);width:100%}
.search-box input::placeholder{color:var(--ink-4)}
.notif-btn{position:relative;width:36px;height:36px;background:var(--bg);border:1.5px solid var(--line);border-radius:9px;display:grid;place-items:center}
.notif-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--card)}
.user-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#14532D,#16A34A);display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.page-tabs{display:flex;padding:0 28px;background:var(--card);border-bottom:1.5px solid var(--line)}
.ptab{padding:14px 18px;font-size:13.5px;font-weight:500;color:var(--ink-3);border-bottom:2.5px solid transparent;transition:color .12s,border-color .12s;display:flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap}
.ptab:hover{color:var(--ink-2)}
.ptab.on{color:var(--gdk);border-bottom-color:var(--gdk);font-weight:600}
.content{padding:20px 28px 36px;display:flex;flex-direction:column;gap:18px}
.card{background:var(--card);border-radius:var(--r);padding:22px;box-shadow:var(--sh);border:1.5px solid var(--line)}
.card-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px}
.card-sub{font-size:11.5px;color:var(--ink-4);margin-bottom:18px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.kpi{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);border:1.5px solid var(--line)}
.kpi-label{font-size:11px;color:var(--ink-3);font-weight:500;margin-bottom:4px}
.kpi-val{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.025em;line-height:1;font-feature-settings:"tnum"}
.kpi-delta{font-size:11.5px;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:3px}
.kpi-delta.up{color:var(--gmd)} .kpi-delta.dn{color:var(--red)}
.kpi-sub2{font-size:10.5px;color:var(--ink-4);margin-top:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:16px;align-items:start}
.grid-32{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}
.h-bars{display:flex;flex-direction:column;gap:10px}
.h-bar-row{display:flex;flex-direction:column;gap:4px}
.h-bar-top{display:flex;align-items:center;justify-content:space-between}
.h-bar-name{font-size:12.5px;font-weight:500;color:var(--ink-2)}
.h-bar-val{font-size:12px;font-weight:600;color:var(--ink-3);font-feature-settings:"tnum"}
.h-bar-track{height:7px;background:var(--line-2);border-radius:999px;overflow:hidden}
.h-bar-fill{height:100%;border-radius:999px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:999px;white-space:nowrap}
.tag-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.tag-green{color:var(--gmd);background:var(--glt)}
.tag-amber{color:#B5781E;background:#FFF8EC}
.tag-red{color:var(--red);background:var(--red-lt)}
.tag-blue{color:var(--blue);background:var(--blue-lt)}
.tag-grey{color:var(--ink-3);background:var(--bg)}
/* range toggle */
.range-tabs{display:flex;background:var(--bg);border:1.5px solid var(--line);border-radius:8px;padding:2px;gap:1px}
.rtab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--ink-3);cursor:pointer;transition:.12s}
.rtab.on{background:var(--card);color:var(--gdk);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.07)}
/* line chart */
.chart-area{position:relative;overflow:visible}
.chart-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-3);cursor:pointer;font-weight:500}
.leg-swatch{width:24px;height:3px;border-radius:2px;flex:none}
/* funnel */
.funnel{display:flex;flex-direction:column;gap:4px;align-items:center}
.funnel-step{border-radius:8px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;width:100%;cursor:default;transition:opacity .2s}
.funnel-step:hover{opacity:.85}
.fs-label{font-size:13px;font-weight:600;color:#fff}
.fs-meta{font-size:11px;color:rgba(255,255,255,.75);margin-top:1px}
.fs-count{font-size:20px;font-weight:700;color:#fff;font-feature-settings:"tnum"}
.funnel-arrow{color:var(--ink-4);font-size:12px;text-align:center;padding:2px 0}
/* table */
.tbl-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border:1.5px solid var(--line)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;color:var(--ink-4);padding:11px 14px;background:var(--bg);border-bottom:1.5px solid var(--line)}
.tbl thead th:first-child{padding-left:20px}
.tbl tbody td{padding:12px 14px;border-bottom:1px solid var(--line);color:var(--ink-2);vertical-align:middle}
.tbl tbody td:first-child{padding-left:20px}
.tbl tbody tr:last-child td{border-bottom:none}
/* insight cards */
.insight-card{padding:14px 16px;border-radius:10px;border:1.5px solid;margin-bottom:10px}
.insight-card:last-child{margin-bottom:0}
.ic-title{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:3px}
.ic-body{font-size:12px;color:var(--ink-3);line-height:1.5}
</style>
</head>

<script>
function fit(){const s=document.querySelector('.stage');if(!s)return;const w=document.documentElement.clientWidth,sc=Math.min(1,w/1440);s.style.transform=`scale(${sc})`;document.body.style.height=s.getBoundingClientRect().height+'px';}
addEventListener('resize',fit);addEventListener('load',()=>{fit();setTimeout(fit,100);setTimeout(fit,600);});
new MutationObserver(fit).observe(document.body,{childList:true,subtree:true});
</script>

// ── ICONS ─────────────────────────────────────────────────────────
const Ico = ({ n, s=16, c="currentColor" }) => {
  const p={width:s,height:s,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"};
  const d={
    dash:   <svg {...p}><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,

    coins:  <svg {...p}><ellipse cx="9" cy="7" rx="6" ry="3"/><path d="M3 7v5c0 1.7 2.7 3 6 3s6-1.3 6-3V7"/><path d="M3 12v5c0 1.7 2.7 3 6 3s6-1.3 6-3v-2"/></svg>,
    cal:    <svg {...p}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>,
    chart:  <svg {...p}><rect x="3" y="11" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="13" rx="1"/><rect x="17" y="3" width="4" height="17" rx="1"/></svg>,
    spark:  <svg {...p}><path d="m3 17 4-4 4 3 6-7 4 4"/></svg>,
    set:    <svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>,
    srch:   <svg {...p}><circle cx="11" cy="11" r="6.5"/><path d="m20 20-3.5-3.5"/></svg>,
    bell:   <svg {...p}><path d="M6 16V11a6 6 0 1 1 12 0v5l1.5 2H4.5z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>,
    out:    <svg {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>,
    map:    <svg {...p}><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2z"/><path d="M9 4v14M15 6v14"/></svg>,

const NAV = [
  { id:"overview",  label:"Overview",  icon:"dash",  href:"Baguio Innovation Dashboard.html" },

// ── LINE CHART ────────────────────────────────────────────────────
const LineChart = ({ data, series, w=680, h=180 }) => {
  const [hover, setHover] = useState(null);
  const pad = { t:20, r:20, b:30, l:44 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const n = data.length;
  const allVals = series.flatMap(s => data.map(d => d[s.key]));
  const yMax = Math.max(...allVals) * 1.12;
  const x = i => pad.l + (i / (n-1)) * cw;
  const y = v => pad.t + ch - (v / yMax) * ch;
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(p => Math.round(yMax * p));

  return (
    <svg width={w} height={h} style={{overflow:"visible",width:"100%"}} viewBox={`0 0 ${w} ${h}`}>
      {/* grid */}
      {gridLines.map(g => (
        <g key={g}>
          <line x1={pad.l} y1={y(g)} x2={pad.l+cw} y2={y(g)} stroke="var(--line)" strokeWidth="1" strokeDasharray="4 3"/>
          <text x={pad.l-6} y={y(g)+4} textAnchor="end" fontSize="9" fill="var(--ink-4)" fontFamily="Inter,sans-serif">{g}</text>
        </g>
      ))}
      {/* x labels */}
      {data.map((d,i) => (
        <text key={d.yr} x={x(i)} y={h-4} textAnchor="middle" fontSize="10" fill="var(--ink-4)" fontFamily="Inter,sans-serif">{d.yr}</text>
      ))}
      {/* lines */}
      {series.map(s => {
        const pts = data.map((d,i) => `${x(i)},${y(d[s.key])}`).join(" ");
        return <polyline key={s.key} points={pts} fill="none" stroke={s.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>;
      })}
      {/* dots on hover index */}
      {hover !== null && series.map(s => (
        <circle key={s.key} cx={x(hover)} cy={y(data[hover][s.key])} r="4" fill={s.color} stroke="#fff" strokeWidth="1.5"/>
      ))}
      {/* hover zones */}
      {data.map((d,i) => (
        <rect key={i} x={x(i)-18} y={pad.t} width={36} height={ch} fill="transparent"
          onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}/>
      ))}
      {/* tooltip */}
      {hover !== null && (() => {
        const tx = x(hover), ty = pad.t + 4;
        const d = data[hover];
        const lines = series.map(s => `${s.label}: ${s.key==="capital"?"₱"+d[s.key]+"M":d[s.key]}`);
        const bw = 130, bh = 16 + lines.length * 16 + 8;
        const bx = Math.min(tx - bw/2, w - bw - 4);
        return (
          <g>
            <rect x={bx} y={ty} width={bw} height={bh} rx="6" fill="var(--ink-2)"/>
            <text x={bx+8} y={ty+13} fontSize="10" fontWeight="600" fill="#fff" fontFamily="Inter,sans-serif">{d.yr}</text>
            {lines.map((l,i)=>(
              <text key={i} x={bx+8} y={ty+13+14*(i+1)} fontSize="10" fill="rgba(255,255,255,.8)" fontFamily="Inter,sans-serif">{l}</text>
            ))}
          </g>
        );
      })()}
    </svg>
  );
};
