  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

AspectRatio=\"none\"><polyline points=\"6,40 60,8 114,40\" stroke=\"#F5A623\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"6,62 60,30 114,62\" stroke=\"#E23A2E\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"6,84 60,52 114,84\" stroke=\"#9E2A52\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"6,106 60,74 114,106\" stroke=\"#285E7A\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg>\n          <div style=\"position:relative;max-width:860px;margin:0 auto;\">\n            <div style=\"font-size:12.5px;color:rgba(255,255,255,0.45);margin-bottom:20px;\">Home <span style=\"margin:0 6px;\">/<\u002Fspan> <span style=\"color:rgba(255,255,255,0.8);\">About<\u002Fspan><\u002Fdiv>\n            <div style=\"display:inline-flex;align-items:center;gap:9px;padding:7px 15px;border-radius:9999px;border:1px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.04);margin-bottom:26px;\"><span style=\"width:7px;height:7px;border-radius:9999px;background:#F26522;\"><\u002Fspan><span style=\"font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.75);\">About the Alliance<\u002Fspan><\u002Fdiv>\n            <h1 style=\"margin:0;font-size:60px;line-height:1.02;font-weight:700;letter-spacing:-0.035em;color:#fff;\">The missing link between<br>ideas and <span style=\"color:#F26522;\">impact.<\u002Fspan><\u002Fh1>\n            <p style=\"margin:24px auto 0;font-size:18px;line-height:1.6;color:rgba(255,255,255,0.66);max-width:620px;\">Incubator Baguio is the city's institutional home for innovation, connecting government, academe, industry, and the community under one alliance to turn local talent into lasting value.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- MISSION + VISION (light) -->\n        <div style=\"background:#FAFAF7;padding:72px 40px;\">\n          <div style=\"max-width:1080px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:20px;\">\n            <div style=\"background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:20px;padding:36px;border-top:3px solid #F26522;\">\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#F26522;margin-bottom:14px;\">Our Mission<\u002Fdiv>\n              <p style=\"margin:0;font-size:21px;line-height:1.5;font-weight:500;color:#1A1A1F;letter-spacing:-0.01em;\">To build a dynamic, inclusive, and authoritative platform that turns Baguio's intellectual capital into economic and social value.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:20px;padding:36px;border-top:3px solid #285E7A;\">\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#285E7A;margin-bottom:14px;\">Our Vision<\u002Fdiv>\n              <p style=\"margin:0;font-size:21px;line-height:1.5;font-weight:500;color:#1A1A1F;letter-spacing:-0.01em;\">A Baguio recognized as a leading hub for research, innovation, and homegrown startups in the Cordillera and beyond.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- QUADRUPLE HELIX (dark) -->\n        <div style=\"background:#0E0E10;padding:76px 40px;position:relative;overflow:hidden;\">\n          <div style=\"position:absolute;top:-120px;right:-80px;width:440px;height:440px;background:radial-gradient(circle,rgba(242,101,34,0.18),transparent 65%);\"><\u002Fdiv>\n          <div style=\"position:relative;max-width:1080px;margin:0 auto;\">\n            <div style=\"text-align:center;margin-bottom:44px;\">\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#FFB489;margin-bottom:14px;\">One alliance, four forces<\u002Fdiv>\n              <h2 style=\"margin:0;font-size:40px;font-weight:700;letter-spacing:-0.025em;color:#fff;\">Built on the quadruple helix<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px;\">\n              <div style=\"background:#141418;border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:26px;border-top:3px solid #F26522;\">\n                <div style=\"width:44px;height:44px;border-radius:12px;background:rgba(242,101,34,0.14);display:flex;align-items:center;justify-content:center;margin-bottom:16px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F26522\" stroke-width=\"2\"><path d=\"M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"margin:0 0 7px;font-size:18px;font-weight:600;color:#fff;\">Government<\u002Fh3>\n                <p style=\"margin:0;font-size:13.5px;line-height:1.55;color:rgba(255,255,255,0.58);\">The City Government convenes the alliance and anchors it in policy and public mandate.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:#141418;border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:26px;border-top:3px solid #F5A623;\">\n                <div style=\"width:44px;height:44px;border-radius:12px;background:rgba(245,166,35,0.14);display:flex;align-items:center;justify-content:center;margin-bottom:16px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F5A623\" stroke-width=\"2\"><path d=\"M22 10 12 5 2 10l10 5 10-5Z\"><\u002Fpath><path d=\"M6 12v5c3 2 9 2 12 0v-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"margin:0 0 7px;font-size:18px;font-weight:600;color:#fff;\">Academe<\u002Fh3>\n                <p style=\"margin:0;font-size:13.5px;line-height:1.55;color:rgba(255,255,255,0.58);\">Universities supply research, talent, and the labs where new ideas are tested.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:#141418;border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:26px;border-top:3px solid #E23A2E;\">\n                <div style=\"width:44px;height:44px;border-radius:12px;background:rgba(226,58,46,0.12);display:flex;align-items:center;justify-content:center;margin-bottom:16px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E23A2E\" stroke-width=\"2\"><path d=\"M3 21V8l6-4 6 4M15 21V11l6-3v13M3 21h18M8 12v.01M8 16v.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"margin:0 0 7px;font-size:18px;font-weight:600;color:#fff;\">Industry<\u002Fh3>\n                <p style=\"margin:0;font-size:13.5px;line-height:1.55;color:rgba(255,255,255,0.58);\">Companies bring markets, mentorship, and capital to scale what works.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:#141418;border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:26px;border-top:3px solid #285E7A;\">\n                <div style=\"width:44px;height:44px;border-radius:12px;background:rgba(40,94,122,0.14);display:flex;align-items:center;justify-content:center;margin-bottom:16px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5B9BC0\" stroke-width=\"2\"><circle cx=\"9\" cy=\"8\" r=\"3\"><\u002Fcircle><circle cx=\"17\" cy=\"10\" r=\"2.5\"><\u002Fcircle><path d=\"M3 20c0-3 2.5-5 6-5s6 2 6 5M15 20c0-2 .8-3.5 2-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"margin:0 0 7px;font-size:18px;font-weight:600;color:#fff;\">Community<\u002Fh3>\n                <p style=\"margin:0;font-size:13.5px;line-height:1.55;color:rgba(255,255,255,0.58);\">Civil society and the public ground the work in real local needs.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- MANDATE / STORY (light split) -->\n        <div style=\"background:#fff;padding:76px 40px;\">\n          <div style=\"max-width:1080px;margin:0 auto;display:grid;grid-template-columns:0.85fr 1.15fr;gap:52px;align-items:center;\">\n            <div style=\"position:relative;border-radius:20px;overflow:hidden;background:#0B0B0D;aspect-ratio:4/4.2;display:flex;align-items:center;justify-content:center;\">\n              <div style=\"position:absolute;inset:0;background:linear-gradient(160deg,rgba(242,101,34,0.14),transparent 55%);\"><\u002Fdiv>\n              <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:24px;\"><svg width=\"120\" height=\"104\" viewBox=\"0 0 120 104\" fill=\"none\"><polyline points=\"12,40 60,12 108,40\" stroke=\"#F5A623\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"12,60 60,32 108,60\" stroke=\"#E23A2E\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"12,80 60,52 108,80\" stroke=\"#9E2A52\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"12,100 60,72 108,100\" stroke=\"#285E7A\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><div style=\"font-size:11.5px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.4);\">City Hall Imagery<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#F26522;margin-bottom:14px;\">Our Mandate<\u002Fdiv>\n              <h2 style=\"margin:0 0 18px;font-size:36px;font-weight:700;letter-spacing:-0.025em;color:#141417;line-height:1.1;\">A public institution, by ordinance<\u002Fh2>\n              <p style=\"margin:0 0 16px;font-size:16px;line-height:1.65;color:#44444C;\">Incubator Baguio was operationalized under Ordinance No. 63, Series of 2023, establishing the Baguio City Research and Innovation Alliance under the City Planning, Development and Sustainability Office (CPDSO).<\u002Fp>\n              <p style=\"margin:0 0 26px;font-size:16px;line-height:1.65;color:#6B6B73;\">That mandate makes the work durable. It is not a one-off project but a standing commitment of the City Government to nurture innovation for the long term.<\u002Fp>\n              <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n                <div style=\"background:#FBFAF6;border:1px solid rgba(20,20,25,0.08);border-radius:14px;padding:16px 20px;\"><div style=\"font-size:13px;font-weight:600;color:#141417;\">Ordinance No. 63<\u002Fdiv><div style=\"font-size:12.5px;color:#9A958B;margin-top:3px;\">Series of 2023<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#FBFAF6;border:1px solid rgba(20,20,25,0.08);border-radius:14px;padding:16px 20px;\"><div style=\"font-size:13px;font-weight:600;color:#141417;\">CPDSO<\u002Fdiv><div style=\"font-size:12.5px;color:#9A958B;margin-top:3px;\">Convening office<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#FBFAF6;border:1px solid rgba(20,20,25,0.08);border-radius:14px;padding:16px 20px;\"><div style=\"font-size:13px;font-weight:600;color:#141417;\">City of Baguio<\u002Fdiv><div style=\"font-size:12.5px;color:#9A958B;margin-top:3px;\">Local government<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- VALUES (light) -->\n        <div style=\"background:#FAFAF7;padding:72px 40px;border-top:1px solid rgba(20,20,25,0.06);\">\n          <div style=\"max-width:1080px;margin:0 auto;\">\n            <div style=\"text-align:center;margin-bottom:42px;\">\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#F26522;margin-bottom:12px;\">What guides us<\u002Fdiv>\n              <h2 style=\"margin:0;font-size:40px;font-weight:700;letter-spacing:-0.025em;color:#141417;\">Our values<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n              <div style=\"background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:18px;padding:28px;\">\n                <div style=\"font-size:30px;font-weight:700;color:#F26522;letter-spacing:-0.02em;margin-bottom:10px;\">01<\u002Fdiv>\n                <h3 style=\"margin:0 0 7px;font-size:18px;font-weight:600;color:#141417;\">Inclusive by design<\u002Fh3>\n                <p style=\"margin:0;font-size:14px;line-height:1.55;color:#6B6B73;\">Innovation should be open to every student, founder, and researcher in the city.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:18px;padding:28px;\">\n                <div style=\"font-size:30px;font-weight:700;color:#F5A623;letter-spacing:-0.02em;margin-bottom:10px;\">02<\u002Fdiv>\n                <h3 style=\"margin:0 0 7px;font-size:18px;font-weight:600;color:#141417;\">Rooted in Baguio<\u002Fh3>\n                <p style=\"margin:0;font-size:14px;line-height:1.55;color:#6B6B73;\">We solve real local problems first, drawing on the city's own talent and culture.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:18px;padding:28px;\">\n                <div style=\"font-size:30px;font-weight:700;color:#285E7A;letter-spacing:-0.02em;margin-bottom:10px;\">03<\u002Fdiv>\n                <h3 style=\"margin:0 0 7px;font-size:18px;font-weight:600;color:#141417;\">Built to last<\u002Fh3>\n                <p style=\"margin:0;font-size:14px;line-height:1.55;color:#6B6B73;\">Backed by public mandate, we invest in outcomes that outlive any single program.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- CTA (orange panel) -->\n n                <div style=\"display:flex;gap:10px;margin-bottom:18px;\">\n                  <span style=\"font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#D88A0A;background:rgba(245,166,35,0.16);padding:6px 12px;border-radius:9999px;\">Annual · For Youth<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#7ED957;background:rgba(126,217,87,0.12);padding:6px 12px;border-radius:9999px;\">Applications open<\u002Fspan>\n                <\u002Fdiv>\n                <h1 style=\"margin:0;font-size:54px;font-weight:700;letter-spacing:-0.03em;color:#fff;line-height:1.02;\">Innovation Camp<\u002Fh1>\n                <p style=\"margin:18px 0 28px;font-size:17px;line-height:1.6;color:rgba(255,255,255,0.66);max-width:520px;\">A high-energy annual immersion for 500+ students and young innovators. Turn a raw idea into a working prototype in days, guided by mentors and real SDG challenge briefs.<\u002Fp>\n                <div style=\"display:flex;gap:30px;\">\n                  <div><div style=\"font-size:24px;font-weight:700;color:#F26522;\">500+<\u002Fdiv><div style=\"font-size:12.5px;color:rgba(255,255,255,0.55);\">Target participants<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:24px;font-weight:700;color:#F5A623;\">3 days<\u002Fdiv><div style=\"font-size:12.5px;color:rgba(255,255,255,0.55);\">Intensive sprint<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:24px;font-weight:700;color:#285E7A;\">13<\u002Fdiv><div style=\"font-size:12.5px;color:rgba(255,255,255,0.55);\">SDG challenge areas<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"position:relative;border-radius:18px;overflow:hidden;background:#141418;border:1px solid rgba(255,255,255,0.08);aspect-ratio:4/3.4;display:flex;align-items:center;justify-content:center;\">\n                <div style=\"position:absolute;inset:0;background:linear-gradient(160deg,rgba(245,166,35,0.12),transparent 55%);\"><\u002Fdiv>\n                <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;gap:12px;\"><svg width=\"110\" height=\"95\" viewBox=\"0 0 120 104\" fill=\"none\"><polyline points=\"12,40 60,12 108,40\" stroke=\"#F5A623\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"12,60 60,32 108,60\" stroke=\"#E23A2E\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"12,80 60,52 108,80\" stroke=\"#9E2A52\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"12,100 60,72 108,100\" stroke=\"#285E7A\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><div style=\"font-size:11.5px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.4);\">Camp Imagery<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- BODY: 2-col -->\n        <div style=\"background:#FAFAF7;padding:60px 40px 72px;\">\n          <div style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 340px;gap:48px;align-items:start;\">\n\n            <!-- MAIN -->\n            <div>\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#F26522;margin-bottom:12px;\">Overview<\u002Fdiv>\n              <p style=\"margin:0 0 16px;font-size:18px;line-height:1.65;color:#2A2A30;\">Innovation Camp is where Baguio's youth stop waiting for permission to build. Over an intensive three-day sprint, participants form teams, tackle a real challenge brief aligned to the city's priority research areas, and ship a working prototype.<\u002Fp>\n              <p style=\"margin:0 0 40px;font-size:15.5px;line-height:1.65;color:#6B6B73;\">No prior startup experience is required, just curiosity and a willingness to make something. The best teams are fast-tracked into the Startup Incubation Program.<\u002Fp>\n\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#F26522;margin-bottom:18px;\">How the camp runs<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:44px;\">\n                <div style=\"display:grid;grid-template-columns:auto 1fr;gap:18px;background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:16px;padding:22px 24px;\">\n                  <div style=\"width:40px;height:40px;border-radius:9999px;background:#F26522;color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;\">1<\u002Fdiv>\n                  <div><h4 style=\"margin:0 0 4px;font-size:17px;font-weight:600;color:#141417;\">Day 1 · Discover &amp; team up<\u002Fh4><p style=\"margin:0;font-size:14px;line-height:1.55;color:#6B6B73;\">Challenge briefs are revealed, teams form around problems, and mentors run a design-thinking kickoff.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:auto 1fr;gap:18px;background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:16px;padding:22px 24px;\">\n                  <div style=\"width:40px;height:40px;border-radius:9999px;background:#F5A623;color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;\">2<\u002Fdiv>\n                  <div><h4 style=\"margin:0 0 4px;font-size:17px;font-weight:600;color:#141417;\">Day 2 · Build the prototype<\u002Fh4><p style=\"margin:0;font-size:14px;line-height:1.55;color:#6B6B73;\">Teams prototype with mentor check-ins, technical clinics, and access to tools and materials.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:auto 1fr;gap:18px;background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:16px;padding:22px 24px;\">\n                  <div style=\"width:40px;height:40px;border-radius:9999px;background:#285E7A;color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;\">3<\u002Fdiv>\n                  <div><h4 style=\"margin:0 0 4px;font-size:17px;font-weight:600;color:#141417;\">Day 3 · Pitch &amp; prizes<\u002Fh4><p style=\"margin:0;font-size:14px;line-height:1.55;color:#6B6B73;\">Teams pitch to a panel; winners take prizes and an invitation to incubation.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#F26522;margin-bottom:18px;\">Sample challenge briefs<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:44px;\">\n                <div style=\"background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:14px;padding:20px;border-left:3px solid #7ED957;\"><div style=\"font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#3F9E4D;margin-bottom:8px;\">Food security<\u002Fdiv><p style=\"margin:0;font-size:14px;color:#44444C;line-height:1.5;\">Reduce post-harvest loss for Cordillera highland vegetable farmers.<\u002Fp><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:14px;padding:20px;border-left:3px solid #285E7A;\"><div style=\"font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#285E7A;margin-bottom:8px;\">Environment<\u002Fdiv><p style=\"margin:0;font-size:14px;color:#44444C;line-height:1.5;\">Help Baguio manage waste and protect its watersheds.<\u002Fp><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:14px;padding:20px;border-left:3px solid #9E2A52;\"><div styl <\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;gap:11px;align-items:flex-start;\"><span style=\"width:17px;height:17px;border-radius:9999px;border:2px solid rgba(20,20,25,0.2);flex-shrink:0;margin-top:1px;\"><\u002Fspan><span style=\"font-size:14px;color:#44444C;\">Traction or validation so far<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;gap:11px;align-items:flex-start;\"><span style=\"width:17px;height:17px;border-radius:9999px;border:2px solid rgba(20,20,25,0.2);flex-shrink:0;margin-top:1px;\"><\u002Fspan><span style=\"font-size:14px;color:#44444C;\">A pitch deck (optional)<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#FFF6F0;border:1px solid rgba(242,101,34,0.2);border-radius:18px;padding:24px;\">\n                <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F26522\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 16v-5M12 8h.01\"><\u002Fpath><\u002Fsvg><span style=\"font-size:14px;font-weight:600;color:#141417;\">What happens next<\u002Fspan><\u002Fdiv>\n                <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6B6B73;\">You'll get an acknowledgment email instantly. Our team reviews applications and invites shortlisted founders to an interview.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid rgba(20,20,25,0.10);border-radius:18px;padding:22px;\">\n                <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6B6B73;\">Questions? Email <span style=\"color:#F26522;font-weight:600;\">apply@incubatorbaguio.ph<\u002Fspan> or visit the CPDSO at Baguio City Hall.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    const run = () => {\n      document.querySelectorAll('[data-count]').forEach(el=>{\n        const target=parseFloat(el.getAttribute('data-count'));\n        const suffix=el.getAttribute('data-suffix')||'';\n        const dur=1300; const start=performance.now();\n        const step=(now)=>{\n          const t=Math.min(1,(now-start)/dur);\n          const e=1-Math.pow(1-t,3);\n          el.textContent=Math.round(target*e)+suffix;\n          if(t<1) requestAnimationFrame(step);\n        };\n        requestAnimationFrame(step);\n      });\n    };\n    setTimeout(run, 350);\n  }\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
